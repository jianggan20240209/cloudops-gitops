apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-gateway
  namespace: cloudops-dev
  labels:
    app: cloudops-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-gateway
  template:
    metadata:
      labels:
        app: cloudops-gateway
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: cloudops-gateway
          image: harbor-server.jianggan.cn/cloudops/cloudops-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-gateway
  namespace: cloudops-dev
  labels:
    app: cloudops-gateway
spec:
  type: ClusterIP
  selector:
    app: cloudops-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-gateway
  namespace: cloudops-dev
  annotations:
    cert-manager.io/cluster-issuer: jianggan-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cloudops.jianggan.cn
      secretName: cloudops-jianggan-cn-tls
  rules:
    - host: cloudops.jianggan.cn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cloudops-gateway
                port:
                  number: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudops-gateway
  namespace: cloudops-dev
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: cloudops-gateway
  namespaceSelector:
    matchNames:
      - cloudops-dev
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
