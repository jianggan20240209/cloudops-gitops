apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-web
  namespace: cloudops-dev
  labels:
    app: cloudops-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-web
  template:
    metadata:
      labels:
        app: cloudops-web
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: cloudops-web
          image: harbor-server.jianggan.cn/cloudops/cloudops-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-web
  namespace: cloudops-dev
spec:
  type: ClusterIP
  selector:
    app: cloudops-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudops-web
  namespace: cloudops-dev
  annotations:
    cert-manager.io/cluster-issuer: jianggan-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cloudops.jianggan.cn
      secretName: cloudops-jianggan-cn-tls
  rules:
    - host: cloudops.jianggan.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudops-web
                port:
                  number: 80
