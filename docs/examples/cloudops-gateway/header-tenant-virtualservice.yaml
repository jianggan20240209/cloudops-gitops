# Example only. This manifest is not referenced by Argo CD.
# Apply manually only after reviewing current Rollout and VirtualService state.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cloudops-gateway-rollout
  namespace: cloudops-dev
  labels:
    app: cloudops-gateway-rollout
    env: dev
    app.kubernetes.io/name: cloudops-gateway-rollout
    app.kubernetes.io/part-of: cloudops
    app.kubernetes.io/managed-by: argocd
spec:
  hosts:
    - istio-cloudops-gateway.jianggan.cn
    - api.cloudops.jianggan.cn
  gateways:
    - cloudops-gateway-rollout
  http:
    - name: tenant-canary
      match:
        - headers:
            x-tenant-id:
              exact: test-tenant
        - headers:
            x-tenant-id:
              exact: prod-tenant-001
      route:
        - destination:
            host: cloudops-gateway-rollout-canary
            port:
              number: 80
          weight: 100
    - name: user-canary
      match:
        - headers:
            x-canary-user:
              exact: qa
        - headers:
            x-canary-user:
              exact: sre
      route:
        - destination:
            host: cloudops-gateway-rollout-canary
            port:
              number: 80
          weight: 100
    - name: manual-canary
      match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: cloudops-gateway-rollout-canary
            port:
              number: 80
          weight: 100
    - name: primary
      route:
        - destination:
            host: cloudops-gateway-rollout-stable
            port:
              number: 80
          weight: 100
        - destination:
            host: cloudops-gateway-rollout-canary
            port:
              number: 80
          weight: 0
