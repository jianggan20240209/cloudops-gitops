apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudops-go.name" . }}
  namespace: {{ .Values.base.namespace }}
  labels:
{{ include "cloudops-go.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "cloudops-go.name" . }}
  ports:
    - name: http
      port: {{ .Values.app.servicePort }}
      targetPort: {{ .Values.service.targetPort }}
