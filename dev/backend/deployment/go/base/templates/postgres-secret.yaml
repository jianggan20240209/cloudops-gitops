{{- if .Values.releaseRecords.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.releaseRecords.database.dsnSecret.name }}
  namespace: {{ .Values.base.namespace }}
  labels:
{{ include "cloudops-go.labels" . | indent 4 }}
type: Opaque
stringData:
  {{ .Values.releaseRecords.database.dsnSecret.key }}: "postgres://{{ .Values.releaseRecords.postgres.username }}@{{ .Values.releaseRecords.postgres.serviceName }}.{{ .Values.base.namespace }}.svc.cluster.local:5432/{{ .Values.releaseRecords.postgres.database }}?sslmode=disable"
{{- end }}
