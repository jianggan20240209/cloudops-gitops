apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudops-go.name" . }}
  namespace: {{ .Values.base.namespace }}
  labels:
{{ include "cloudops-go.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ include "cloudops-go.name" . }}
  template:
    metadata:
      labels:
{{ include "cloudops-go.labels" . | indent 8 }}
    spec:
{{- if .Values.kubernetes.enabled }}
      serviceAccountName: {{ .Values.kubernetes.serviceAccountName }}
{{- end }}
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: {{ include "cloudops-go.name" . }}
          image: harbor-server.jianggan.cn/cloudops/{{ .Values.app.serviceName }}:{{ .Values.app.imageTag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: HTTP_ADDR
              value: ":{{ .Values.service.targetPort }}"
{{- if .Values.argocd.enabled }}
            - name: ARGOCD_SERVER
              value: {{ .Values.argocd.server | quote }}
            - name: ARGOCD_INSECURE
              value: {{ .Values.argocd.insecure | quote }}
            - name: ARGOCD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.argocd.tokenSecret.name }}
                  key: {{ .Values.argocd.tokenSecret.key }}
{{- end }}
{{- if .Values.harbor.enabled }}
            - name: HARBOR_SERVER
              value: {{ .Values.harbor.server | quote }}
            - name: HARBOR_INSECURE
              value: {{ .Values.harbor.insecure | quote }}
            - name: HARBOR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.harbor.credentialSecret.name }}
                  key: {{ .Values.harbor.credentialSecret.usernameKey }}
            - name: HARBOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.harbor.credentialSecret.name }}
                  key: {{ .Values.harbor.credentialSecret.passwordKey }}
{{- end }}
{{- if .Values.prometheus.enabled }}
            - name: PROMETHEUS_SERVER
              value: {{ .Values.prometheus.server | quote }}
{{- end }}
{{- if .Values.releaseRecords.database.enabled }}
            - name: RELEASE_RECORD_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.releaseRecords.database.dsnSecret.name }}
                  key: {{ .Values.releaseRecords.database.dsnSecret.key }}
{{- end }}
{{- if .Values.releaseRecords.writeAuth.enabled }}
            - name: RELEASE_RECORD_WRITE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.releaseRecords.writeAuth.tokenSecret.name }}
                  key: {{ .Values.releaseRecords.writeAuth.tokenSecret.key }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
