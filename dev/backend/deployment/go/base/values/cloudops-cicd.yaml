base:
  envName: dev
  namespace: cloudops-dev

app:
  serviceName: cloudops-cicd
  servicePort: 80
  ingressPath: /api/v1/cicd
  imageTag: main-1
  replicas: 2

service:
  targetPort: 8080
  type: ClusterIP

argocd:
  enabled: true
  server: https://argocd.jianggan.cn
  insecure: "true"
  tokenSecret:
    name: cloudops-cicd-argocd-token
    key: token

harbor:
  enabled: true
  server: https://harbor-server.jianggan.cn
  insecure: "true"
  credentialSecret:
    name: cloudops-cicd-harbor-credential
    usernameKey: username
    passwordKey: password
