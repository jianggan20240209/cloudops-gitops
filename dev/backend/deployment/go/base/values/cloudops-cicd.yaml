base:
  envName: dev
  namespace: cloudops-dev

app:
  serviceName: cloudops-cicd
  servicePort: 80
  ingressPath: /api/v1/cicd
  imageTag: main-1
  replicas: 2

service:
  targetPort: 8080
  type: ClusterIP

argocd:
  enabled: true
  server: https://argocd.jianggan.cn
  insecure: "true"
  tokenSecret:
    name: cloudops-cicd-argocd-token
    key: token

harbor:
  enabled: true
  server: https://harbor-server.jianggan.cn
  insecure: "true"
  credentialSecret:
    name: cloudops-cicd-harbor-credential
    usernameKey: username
    passwordKey: password

prometheus:
  enabled: true
  server: http://kube-prometheus-stack-prometheus.monitoring.svc:9090

kubernetes:
  enabled: true
  serviceAccountName: cloudops-cicd

releaseRecords:
  database:
    enabled: true
    dsnSecret:
      name: cloudops-cicd-postgres
      key: database-url
  writeAuth:
    enabled: false
    tokenSecret:
      name: cloudops-cicd-release-record-token
      key: token
  postgres:
    enabled: true
    image: postgres:16-alpine
    serviceName: cloudops-cicd-postgres
    database: cloudops_cicd
    username: cloudops_cicd
    storageClassName: longhorn
    storageSize: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
