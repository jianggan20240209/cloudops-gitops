apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "istio-rollout.name" . }}
  namespace: {{ include "istio-rollout.namespace" . }}
  labels:
    {{- include "istio-rollout.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: {{ include "istio-rollout.name" . }}
  strategy:
    canary:
      stableService: {{ include "istio-rollout.stableService" . }}
      canaryService: {{ include "istio-rollout.canaryService" . }}
      trafficRouting:
        istio:
          virtualService:
            name: {{ include "istio-rollout.name" . }}
            routes:
              - {{ .Values.istio.virtualService.routeName }}
      steps:
        {{- range .Values.canary.steps }}
        {{- if hasKey . "setWeight" }}
        - setWeight: {{ .setWeight }}
        {{- else if hasKey . "pauseSeconds" }}
        - pause:
            duration: {{ .pauseSeconds }}s
        {{- else if .analysis }}
        - analysis:
            templates:
              - templateName: {{ include "istio-rollout.analysisTemplateName" $ }}
            args:
              - name: service-name
                value: {{ include "istio-rollout.name" $ }}
        {{- end }}
        {{- end }}
  template:
    metadata:
      labels:
        {{- include "istio-rollout.labels" . | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      containers:
        - name: {{ include "istio-rollout.name" . }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
