{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "istio-rollout.name" . }}
  namespace: {{ include "istio-rollout.namespace" . }}
  labels:
    release: {{ .Values.serviceMonitor.release }}
    {{- include "istio-rollout.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "istio-rollout.name" . }}
  namespaceSelector:
    matchNames:
      - {{ include "istio-rollout.namespace" . }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
