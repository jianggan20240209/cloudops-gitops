apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: api-cloudops-jianggan-cn
  namespace: istio-ingress
  labels:
    app: cloudops-gateway-rollout
    env: dev
    app.kubernetes.io/name: cloudops-gateway-rollout
    app.kubernetes.io/part-of: cloudops
    app.kubernetes.io/managed-by: argocd
spec:
  secretName: api-cloudops-jianggan-cn-tls
  dnsNames:
    - api.cloudops.jianggan.cn
  issuerRef:
    kind: ClusterIssuer
    name: jianggan-ca-issuer
