apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod-dev
  namespace: argocd
spec:
  project: dev-platform
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.2
    helm:
      releaseName: istiod
      values: |
        global:
          proxy:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
        meshConfig:
          enablePrometheusMerge: true
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
