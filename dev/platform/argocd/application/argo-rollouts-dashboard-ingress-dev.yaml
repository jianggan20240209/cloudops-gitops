apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts-dashboard-ingress-dev
  namespace: argocd
spec:
  project: dev-platform
  source:
    repoURL: https://github.com/jianggan20240209/cloudops-gitops.git
    targetRevision: main
    path: dev/platform/rollouts/dashboard-ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
