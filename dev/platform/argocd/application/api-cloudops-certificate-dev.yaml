apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-cloudops-certificate-dev
  namespace: argocd
spec:
  project: dev-platform
  source:
    repoURL: https://github.com/jianggan20240209/cloudops-gitops.git
    targetRevision: main
    path: dev/platform/istio/api-cloudops-certificate
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
