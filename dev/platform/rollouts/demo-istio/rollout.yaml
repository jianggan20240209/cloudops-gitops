apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo-istio
  namespace: cloudops-dev
  labels:
    app: rollouts-demo-istio
    env: dev
    app.kubernetes.io/name: rollouts-demo-istio
    app.kubernetes.io/part-of: cloudops
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: rollouts-demo-istio
  strategy:
    canary:
      stableService: rollouts-demo-istio-stable
      canaryService: rollouts-demo-istio-canary
      trafficRouting:
        istio:
          virtualService:
            name: rollouts-demo-istio
            routes:
              - primary
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: rollouts-demo-istio-prometheus
            args:
              - name: service-name
                value: rollouts-demo-istio
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: rollouts-demo-istio-prometheus
            args:
              - name: service-name
                value: rollouts-demo-istio
        - setWeight: 100
  template:
    metadata:
      labels:
        app: rollouts-demo-istio
        env: dev
        app.kubernetes.io/name: rollouts-demo-istio
        app.kubernetes.io/part-of: cloudops
        app.kubernetes.io/managed-by: argocd
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: rollouts-demo-istio
          image: harbor-server.jianggan.cn/cloudops/cloudops-gateway:main-14
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
